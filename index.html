<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>華語生存戰：校園日常 (翻牌版)</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --event-bg: #ffeaa7; 
            --text-main: #2d3436;
            --btn-left: #ff7675;
            --btn-right: #74b9ff;
            --btn-event: #fdcb6e;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0; color: var(--text-main);
        }
        #game-container {
            width: 100%; max-width: 420px;
            background: var(--card-bg); border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            overflow: hidden; display: flex; flex-direction: column;
            height: 90vh; max-height: 750px; position: relative;
        }
        /* 頂部數值區 */
        #stats-board {
            display: flex; justify-content: space-around;
            padding: 15px 10px 5px 10px; background: #2d3436; color: white; font-size: 1.2rem;
        }
        .stat { display: flex; flex-direction: column; align-items: center; transition: all 0.3s; }
        .stat-icon { font-size: 1.6rem; }
        .stat-value { font-weight: bold; margin-top: 5px; transition: color 0.3s; }
        
        /* 危急狀態警告 (紅色閃爍) */
        .danger { color: #ff4757 !important; animation: pulse 1s infinite alternate; }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.2); } }

        /* Buff 狀態區 */
        #buff-board {
            background: #2d3436; color: #f1c40f; text-align: center;
            padding: 5px 10px 10px 10px; font-size: 0.9rem; font-weight: bold;
            min-height: 20px;
        }
        .buff-badge {
            background: rgba(255, 255, 255, 0.2); padding: 3px 8px;
            border-radius: 10px; margin: 0 5px; display: inline-block;
        }

        /* 遊戲進度 */
        #status-bar {
            display: flex; justify-content: space-between;
            padding: 10px 20px; font-size: 0.9rem; background: #dfe6e9; font-weight: bold;
        }
        #card-type { color: #0984e3; }

        /* 卡片顯示區與 3D 翻牌動畫 */
        #card-area {
            flex-grow: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            padding: 25px; text-align: center; transition: background 0.3s;
            /* 3D 特效的關鍵設定 */
            perspective: 1000px;
        }
        #scenario-text {
            font-size: 1.5rem; line-height: 2.6rem; font-weight: 500;
            transition: opacity 0.4s, transform 0.4s;
            /* 3D 特效的關鍵設定 */
            transform-style: preserve-3d;
            backface-visibility: hidden; /* 防止翻轉時看到背面 */
        }
        
        /* 翻牌動畫 Classes */
        /* 卡片翻走 (消失) */
        .flip-out {
            animation: flipOut 0.4s forwards;
        }
        /* 卡片翻入 (出現) */
        .flip-in {
            animation: flipIn 0.4s forwards;
        }

        /* 翻牌動畫關鍵幀 */
        @keyframes flipOut {
            0% { transform: rotateY(0deg); opacity: 1; }
            100% { transform: rotateY(180deg); opacity: 0; }
        }
        @keyframes flipIn {
            0% { transform: rotateY(-180deg); opacity: 0; }
            100% { transform: rotateY(0deg); opacity: 1; }
        }

        ruby { ruby-align: center; }
        rt { font-size: 0.85rem; color: #d63031; font-weight: bold; }

        /* 底部按鈕區 */
        #controls { display: flex; height: 130px; }
        .choice-btn {
            flex: 1; border: none; font-size: 1.2rem; font-weight: bold;
            color: white; cursor: pointer; padding: 15px;
            transition: background 0.2s, opacity 0.2s;
            display: flex; justify-content: center; align-items: center;
            line-height: 1.5rem;
        }
        .choice-btn:active { opacity: 0.8; }
        #btn-left { background-color: var(--btn-left); }
        #btn-right { background-color: var(--btn-right); }
        #btn-event { background-color: var(--btn-event); display: none; color: #2d3436; width: 100%; }

        /* 結束畫面 */
        #game-over {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.95); display: none; flex-direction: column;
            justify-content: center; align-items: center; text-align: center; padding: 20px; z-index: 10;
        }
        #game-over h2 { font-size: 2.5rem; color: #d63031; margin-bottom: 10px; }
